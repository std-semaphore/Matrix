name: CI & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Matrix.slnx

      - name: Build solution
        run: dotnet build Matrix.slnx -c Release --no-restore

      - name: Publish FontEditor for Windows
        run: dotnet publish Matrix.FontEditor/Matrix.FontEditor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/win-x64

      - name: Publish FontEditor for Linux
        run: dotnet publish Matrix.FontEditor/Matrix.FontEditor.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o publish/linux-x64

      - name: Publish FontEditor for macOS (Intel)
        run: dotnet publish Matrix.FontEditor/Matrix.FontEditor.csproj -c Release -r osx-x64 --self-contained true -p:PublishSingleFile=true -o publish/osx-x64

      - name: Publish FontEditor for macOS (Apple Silicon)
        run: dotnet publish Matrix.FontEditor/Matrix.FontEditor.csproj -c Release -r osx-arm64 --self-contained true -p:PublishSingleFile=true -o publish/osx-arm64

      - name: Package FontEditor executables
        run: |
          mkdir dist
          cd publish/win-x64 && zip -r ../../dist/Matrix.FontEditor-win-x64.zip . && cd ../..
          cd publish/linux-x64 && tar -czf ../../dist/Matrix.FontEditor-linux-x64.tar.gz . && cd ../..
          cd publish/osx-x64 && zip -r ../../dist/Matrix.FontEditor-osx-x64.zip . && cd ../..
          cd publish/osx-arm64 && zip -r ../../dist/Matrix.FontEditor-osx-arm64.zip . && cd ../..

      - name: Pack NuGet Packages
        run: |
          # If it's a tag like v1.2.3, strip 'v' to get 1.2.3. Otherwise default to 1.0.0-ci
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_NAME=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          else
            VERSION_NAME="1.0.0-ci-${{ github.run_number }}"
          fi
          
          dotnet pack Matrix.Core/Matrix.Core.csproj -c Release -o nupkgs -p:PackageVersion=$VERSION_NAME
          dotnet pack Matrix.Fonts/Matrix.Fonts.csproj -c Release -o nupkgs -p:PackageVersion=$VERSION_NAME
          dotnet pack Matrix.Boards/Matrix.Boards.csproj -c Release -o nupkgs -p:PackageVersion=$VERSION_NAME

      - name: Add NuGet Source for GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget add source --username std-semaphore --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/std-semaphore/index.json"

      - name: Publish NuGet Packages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget push "nupkgs/*.nupkg" --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Matrix.FontEditor-win-x64.zip
            dist/Matrix.FontEditor-linux-x64.tar.gz
            dist/Matrix.FontEditor-osx-x64.zip
            dist/Matrix.FontEditor-osx-arm64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
